name: Publish package

# Publishes @pxpiestudio/sleeve-ds to GitHub Packages whenever a version
# tag is pushed, e.g.:
#   npm version patch   # bumps package.json + creates the tag
#   git push --follow-tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://npm.pkg.github.com"
          scope: "@pxpiestudio"
      - run: npm install
      - run: npm run build:lib
      - run: npm publish
        env:
          # Provided automatically to the workflow; needs packages: write above.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      # npm ci enforces exact lockfile parity, but the optional wasm32-wasi
      # packages (@tailwindcss/oxide, @rolldown/binding, @unrs/resolver) each
      # pin their own nested @emnapi/* versions that different npm versions
      # resolve differently — GitHub's lts/* runner and a local dev npm can
      # legitimately disagree on that subtree. Matches the Dockerfile, which
      # uses npm install for the same reason.
      run: npm install --no-audit --no-fund
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
